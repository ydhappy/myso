name: Web GUI CI

on:
  push:
    paths:
      - 'bitna/web-gui/**'
  pull_request:
    paths:
      - 'bitna/web-gui/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: cd bitna/web-gui && pip install -r requirements.txt
      - name: Build Docker
        run: cd bitna/web-gui && docker build -t bitna-web-gui .